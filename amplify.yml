version: 1
frontend:
  phases:
    preBuild:
      commands:
        - curl -sSL https://dot.net/v1/dotnet-install.sh > dotnet-install.sh
        - chmod +x *.sh
        - ./dotnet-install.sh -c 10.0 -InstallDir ./dotnet10
        - ./dotnet10/dotnet --version
    build:
      commands:
        - ./dotnet10/dotnet publish F3Wasm/F3Wasm.csproj -c Release -o F3Wasm/release
  artifacts:
    baseDirectory: /F3Wasm/release/wwwroot
    files:
      - '**/*'
  cache:
    paths: []
